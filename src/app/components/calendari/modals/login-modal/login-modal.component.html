<div class="modal-backdrop-custom"></div>
<div class="modal fade show d-block" tabindex="-1" id="loginModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <form (ngSubmit)="onLoginSubmit()" #loginForm="ngForm">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title">Iniciar Sesión</h5>
          <button type="button" class="btn-close btn-close-white" (click)="close.emit()"></button>
        </div>
        <div class="modal-body">
          <div class="row">
            <div class="col-12 col-md-12">
              <label class="form-label">Correo electrónico</label>
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-envelope-fill"></i>
                </span>
                <input type="email" class="form-control" [(ngModel)]="loginData.email" name="loginData.email">
              </div>              
            </div>
          </div>
          <div class="row mt-2">
            <div class="col-12 col-md-12">
              <label class="form-label">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-lock-fill"></i>
                </span>
                <input type="password" class="form-control" [(ngModel)]="loginData.password" name="loginData.password">
              </div>                            
            </div>
          </div>
          
          <div class="d-flex justify-content-between mt-2">
            <button type="submit" class="btn btn-outline-primary">Entrar</button>
            <button type="button" class="btn btn-outline-secondary" (click)="close.emit()">Salir</button>                                               
          </div>

          <!-- SEPARADOR OR -->
          <div class="d-flex align-items-center my-4">
            <hr class="flex-grow-1">
            <span class="mx-3 text-muted">O</span>
            <hr class="flex-grow-1">
          </div>    
          <!-- REGISTRO -->
          <div class="text-center">
            <span class="me-1">¿No tienes cuenta?</span>
            <button type="button" class="btn btn-link p-0 align-baseline" (click)="registrarse.emit()">Registrarse</button>
          </div>
        </div>
      </form>

    </div>
  </div>
</div>
