<!-- Mostrar dia -->
<div class="modal-backdrop-custom"></div>
<div class="modal fade show d-block" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="loginModalLabel">Dia {{ dia | PipeFecha }}</h5>
        <button type="button" class="btn-close" (click)="close.emit()"></button>
      </div>
      <div class="modal-body container-fluid text-center">     
        <div class="row">
          @for(mira of miraDia;track mira.id) {
            <div class="col-md-6">
               <strong>{{mira.id}}</strong>
                <div class="row">
                 @for(col of mira.items;track $index) {
                      <div class="col-md-3 d-flex p-2 rounded text-white m-1" [ngClass]="getHoraClass(col.estado)">
                        {{col.hora_inici}}
                      </div>
                  }
                </div>
           </div>                      
          }
        </div>   
        <hr>
        <div class="d-flex justify-content-between">   
            <button type="button" class="btn btn-outline-secondary" (click)="close.emit()">Salir</button>                                   
        </div>
      </div>    
    </div>
</div>
