<!-- Modal Sala -->
<div class="modal-backdrop-custom"></div>
<div class="modal fade show d-block" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="loginModalLabel">Sala</h5>
        <button type="button" class="btn-close btn-close-white" (click)="close.emit()"></button>
      </div>
      <div class="modal-body">                   
          <div class="modal-body">
            <div class="row">
              <div class="col-md-12">
                <label>Nombre</label>
                <input type="text" class="form-control" [value]="sala.descripcio" disabled name="descripcio" id="descripcio">
              </div>
            </div>
            <div class="row">
              <div class="col-md-6">
                <label>Edificio</label>
                <input type="text" class="form-control" [value]="sala.nom_edifici" disabled name="nom_edifici" id="nom_edifici">
              </div>
            </div>
            <div class="row">
              <div class="col-md-3">
                <label>Capacidad</label>
                <input type="text" class="form-control" [value]="sala.max_ocupacio" disabled name="max" id="max">
              </div>       
              <div class="col-md-4">
                <label>Horario</label>
                <select class="form-select" [value]="sala.horari" name="horari" id="horari" disabled>
                      <option value="1">1 hora</option>
                      <option value="2">½ hora</option>
                </select>
              </div>         
              <div class="col-md-4">
                <label>{{ sala.horari == '2' ? 'Precio ½ hora' : 'Precio hora' }}</label>
                <input type="text" class="form-control"  [value]="sala.preu" disabled name="preu" id="preu">
              </div>                                                
            </div>
            <div class="row p-2">
              <img src="{{ sala.imatge }}" class="card-img-top" alt="Foto del edificio">           
            </div>
            @if(sala.missatge) {
              <div class="row border rounded mt-4 bg-danger p-2">
                <div class="col-md-12">                    
                  <h5>{{ sala.missatge }}</h5>
                </div>
              </div>
            }  
          </div>
          <hr>
          <div class="col-md-12">                                              
                <table class="table table-striped table-bordered">
                    <thead class="table-dark">
                      <tr>        
                        <th>Complementos</th>
                        <th>Precio</th>
                      </tr>
                    </thead>
                    <tbody>
                        @for(comple of complements;  track comple.id; let id_comple = $index) {
                          <tr>        
                              <td class="w-40">{{ comple.descripcio }}</td>      
                              <td class="w-10 text-end">{{ comple.preu | PipePreu }} €</td>
                          </tr>
                        }
                    </tbody>
                </table>
          </div>
          <hr>
          <div class="d-flex justify-content-between">               
              <button type="button" class="btn btn-outline-secondary" (click)="close.emit()">Salir</button>            
          </div>         
      </div>
    </div>
  </div>
</div>
